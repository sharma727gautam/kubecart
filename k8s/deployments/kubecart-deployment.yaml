apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecart-deployment
  namespace: kubecart
  labels:
    app: kubecart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubecart
  template:
    metadata:
      labels:
        app: kubecart
    spec:
      serviceAccountName: kubecart-sa
      containers:
        - name: kubecart-api
          image: kubecart-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: kubecart-config
            - secretRef:
                name: kubecart-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"